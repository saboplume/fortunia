<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortun'IA — Vous êtes au bon endroit 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #7B2FF7;
    --pink: #FF3CAC;
    --orange: #FF7A00;
    --gold: #FFD700;
    --bg: #0A0010;
    --card: rgba(255,255,255,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Mesh gradient background ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(123,47,247,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,60,172,0.25) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 30%, rgba(255,122,0,0.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Canvas confetti ── */
  #canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Ballons ── */
  .balloon {
    position: fixed;
    bottom: -120px;
    width: 60px;
    pointer-events: none;
    z-index: 2;
    animation: rise linear forwards;
    opacity: 0.85;
  }
  .balloon svg { width: 100%; }

  @keyframes rise {
    0%   { transform: translateY(0) rotate(-3deg); opacity: 0.9; }
    50%  { transform: translateY(-55vh) rotate(3deg); }
    100% { transform: translateY(-115vh) rotate(-2deg); opacity: 0; }
  }

  /* ── Main layout ── */
  .page {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem 3rem;
    text-align: center;
    gap: 1.6rem;
  }

  /* ── Logo image ── */
  .logo-img {
    width: clamp(180px, 50vw, 300px);
    animation: fadeDown 0.7s ease both;
    filter: drop-shadow(0 0 24px rgba(123,47,247,0.5));
  }

  /* ── Headline ── */
  .headline {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 9vw, 3.6rem);
    font-weight: 800;
    line-height: 1.08;
    max-width: 700px;
    animation: fadeUp 0.9s 0.3s ease both;
  }
  .headline em {
    font-style: normal;
    background: linear-gradient(90deg, #c97bff, #FF3CAC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Sub ── */
  .sub {
    color: rgba(255,255,255,0.65);
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    max-width: 500px;
    line-height: 1.65;
    animation: fadeUp 0.9s 0.45s ease both;
  }
  .sub strong { color: #FFD700; font-weight: 600; }

  /* ── CTA Button ── */
  .cta-wrap {
    animation: fadeUp 0.9s 0.65s ease both;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: linear-gradient(135deg, var(--purple), #FF3CAC, #FF7A00);
    background-size: 200% 200%;
    border: none;
    padding: 1.1rem 2.5rem;
    border-radius: 999px;
    font-family: 'Syne', sans-serif;
    font-size: clamp(1rem, 4vw, 1.25rem);
    font-weight: 700;
    color: #fff;
    text-decoration: none;
    cursor: pointer;
    box-shadow: 0 8px 40px rgba(123,47,247,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: gradShift 3s 1s infinite alternate ease-in-out;
    letter-spacing: 0.01em;
  }
  @keyframes gradShift {
    0%   { background-position: 0% 50%; box-shadow: 0 8px 40px rgba(123,47,247,0.5); }
    100% { background-position: 100% 50%; box-shadow: 0 8px 60px rgba(255,122,0,0.6); }
  }
  .cta:hover {
    transform: scale(1.05) translateY(-3px);
    box-shadow: 0 16px 60px rgba(255,60,172,0.6);
  }
  .cta:active { transform: scale(0.98); }

  .arrow-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 1rem;
    transition: transform 0.3s;
  }
  .cta:hover .arrow-icon { transform: translateX(4px); }

  /* ── Keyframes ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Sparkle ring around CTA ── */
  .cta-wrap { position: relative; display: inline-block; }
  .spark {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 2.5s infinite ease-in-out;
  }
  .spark:nth-child(1) { width:10px;height:10px;background:#FFD700;top:-8px;left:30px;animation-delay:0s; }
  .spark:nth-child(2) { width:7px;height:7px;background:#FF3CAC;top:10px;right:-10px;animation-delay:0.4s; }
  .spark:nth-child(3) { width:8px;height:8px;background:#c97bff;bottom:-8px;left:50px;animation-delay:0.8s; }
  .spark:nth-child(4) { width:6px;height:6px;background:#FF7A00;bottom:12px;right:20px;animation-delay:1.2s; }
  @keyframes sparkle {
    0%,100% { transform: scale(0.5); opacity: 0; }
    50%      { transform: scale(1.3); opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- Balloons injected by JS -->

<div class="page">
  <img class="logo-img" src="https://i.ibb.co/q8cvY9M/logo-fortunia.png" alt="Fortun'IA">

  <h1 class="headline">
    Si vous êtes ici,<br>
    c'est que vous avez<br>
    <em>osé franchir le pas.</em>
  </h1>

  <p class="sub">
    Bravo ! Vous rejoignez les professionnels libéraux qui font confiance à <strong>l'IA 100% métier</strong>.<br>
    Ne tardez pas — cette offre ne durera pas.
  </p>

  <div class="cta-wrap">
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <span class="spark"></span>
    <a class="cta" href="https://fortunia.vercel.app/" target="_blank" rel="noopener">
      Je demande ma démo gratuite
      <span class="arrow-icon">→</span>
    </a>
  </div>

</div>

<script>
/* ── Confetti canvas ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const colors = ['#7B2FF7','#FF3CAC','#FF7A00','#FFD700','#c97bff','#fff'];

function spawnParticle() {
  return {
    x: Math.random() * W,
    y: -12,
    r: Math.random() * 5 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 2,
    vy: Math.random() * 2 + 1.5,
    tilt: Math.random() * Math.PI * 2,
    tiltSpeed: (Math.random() - 0.5) * 0.12,
    alpha: 1,
    shape: Math.random() > 0.5 ? 'rect' : 'circle'
  };
}

// Spawn burst on load
for (let i = 0; i < 120; i++) {
  const p = spawnParticle();
  p.y = Math.random() * H * 0.6;
  particles.push(p);
}

let frameCount = 0;
function animate() {
  ctx.clearRect(0, 0, W, H);
  frameCount++;
  if (frameCount % 4 === 0 && particles.length < 200) particles.push(spawnParticle());

  particles = particles.filter(p => p.alpha > 0.02);

  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.tilt += p.tiltSpeed;
    if (p.y > H * 0.8) p.alpha -= 0.012;

    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.tilt);
    if (p.shape === 'rect') {
      ctx.fillRect(-p.r, -p.r * 0.5, p.r * 2, p.r);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  requestAnimationFrame(animate);
}
animate();

/* ── Balloons ── */
const balloonColors = [
  ['#7B2FF7','#5a20c4'],
  ['#FF3CAC','#c4257d'],
  ['#FF7A00','#c45c00'],
  ['#FFD700','#c4a200'],
  ['#c97bff','#9a4de0'],
];

function makeBalloon() {
  const [fill, dark] = balloonColors[Math.floor(Math.random() * balloonColors.length)];
  const el = document.createElement('div');
  el.className = 'balloon';
  el.style.left = Math.random() * 90 + 5 + 'vw';
  const dur = Math.random() * 6 + 7;
  el.style.animationDuration = dur + 's';
  el.style.animationDelay = Math.random() * 3 + 's';
  el.style.width = (Math.random() * 25 + 45) + 'px';
  el.innerHTML = `
    <svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="30" cy="30" rx="24" ry="28" fill="${fill}" opacity="0.92"/>
      <ellipse cx="22" cy="18" rx="7" ry="5" fill="white" opacity="0.25"/>
      <polygon points="30,58 27,64 33,64" fill="${dark}"/>
      <line x1="30" y1="64" x2="30" y2="78" stroke="${dark}" stroke-width="1.5" stroke-dasharray="2,2"/>
    </svg>`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (dur + 4) * 1000);
}

// Initial burst
for (let i = 0; i < 10; i++) setTimeout(makeBalloon, i * 300);
// Continuous
setInterval(makeBalloon, 1800);
</script>
</body>
</html>
